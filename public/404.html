<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>C2 Paraná</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redireciona /c2-parana/qualquer-rota para /c2-parana/?/qualquer-rota
    var pathSegmentsToKeep = 1; // /c2-parana = 1 segmento
    var l = window.location;
    var repo = '/c2-parana';

    // Pega o path após /c2-parana/
    var path = l.pathname.replace(repo, '').replace(/^\//, '');

    if (path) {
      // Redireciona para /c2-parana/?/path
      l.replace(repo + '/?/' + path + (l.search ? '&' + l.search.slice(1) : '') + l.hash);
    } else {
      // Redireciona para /c2-parana/
      l.replace(repo + '/');
    }
  </script>
</head>
<body>
  Redirecionando...
</body>
</html>
