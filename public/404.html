<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>C2 Paraná</title>
  <script>
    // SPA redirect for GitHub Pages
    var repo = '/c2-parana';
    var path = window.location.pathname.replace(repo, '').replace(/^\//, '');
    if (path) {
      window.location.replace(
        repo + '/?/' + path +
        (window.location.search ? '&' + window.location.search.slice(1) : '') +
        window.location.hash
      );
    } else {
      window.location.replace(repo + '/');
    }
  </script>
</head>
<body>
  Redirecionando...
</body>
</html>
