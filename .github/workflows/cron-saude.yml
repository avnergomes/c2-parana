# .github/workflows/cron-saude.yml
# Budget: ~1 min/dia (3 exec/semana x ~1-2min modo rapido, 1 exec/semana x ~10min modo completo)
name: ETL Saude (InfoDengue)

on:
  schedule:
    - cron: '0 8 * * 1'    # Segunda: run completo (399 municipios)
    - cron: '0 12 * * 3,5' # Quarta e sexta: run rapido (top 50)
  workflow_dispatch:
    inputs:
      full_run:
        description: 'Rodar todos os 399 municipios?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  etl-saude:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL Saude
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FULL_RUN: ${{ github.event.schedule == '0 8 * * 1' && 'true' || github.event.inputs.full_run || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/etl_saude.py
