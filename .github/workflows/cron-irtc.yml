# .github/workflows/cron-irtc.yml
name: ETL IRTC (Índice de Risco Territorial)

on:
  schedule:
    - cron: '30 */6 * * *'   # A cada 6 horas (30min após ambiente)
  workflow_dispatch:

jobs:
  etl-irtc:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL IRTC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/etl_irtc.py
