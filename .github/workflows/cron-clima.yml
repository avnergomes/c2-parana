# .github/workflows/cron-clima.yml
# Budget: ~12 min/dia (24 exec × ~30s)
# Fonte primária: INMET | Fallback: Open-Meteo
name: ETL Clima (INMET + Open-Meteo)

on:
  schedule:
    - cron: '0 * * * *'   # A cada hora (24 exec/dia)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  etl-clima:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL Clima
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/etl_clima.py
