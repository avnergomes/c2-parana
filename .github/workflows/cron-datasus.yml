# .github/workflows/cron-datasus.yml
# Fase 5.F — DataSUS SIH (internacoes hospitalares por municipio PR)
# Budget: ~5 min/mes (1 exec x ~3min de download + processamento)
name: ETL DataSUS SIH (internacoes mensais)

on:
  schedule:
    # Dia 5 de cada mes as 02:00 UTC — MS libera dados com ~40 dias de delay
    - cron: '0 2 5 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYY-MM para backfill manual (default: 2 meses atras)'
        required: false
        type: string
      last_n_months:
        description: 'Backfill dos N ultimos meses'
        required: false
        default: '1'
        type: string

concurrency:
  group: etl-datasus
  cancel-in-progress: false

jobs:
  etl-datasus:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-datasus.txt

      - name: Instalar dependencias DataSUS
        run: pip install -r scripts/requirements-datasus.txt

      - name: Executar ETL DataSUS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATASUS_UF: PR
        run: |
          MONTH="${{ github.event.inputs.month }}"
          LAST_N="${{ github.event.inputs.last_n_months || '1' }}"
          if [ -n "$MONTH" ]; then
            python scripts/etl_datasus.py --month "$MONTH" --last-n-months "$LAST_N"
          else
            python scripts/etl_datasus.py --last-n-months "$LAST_N"
          fi
