# .github/workflows/cron-escalation.yml
# Budget: ~24 min/dia (96 exec x ~15s)
# Escalation automatica de incidentes por SLA (Fase 4.E)
name: ETL Incident Escalation

on:
  schedule:
    - cron: '*/15 * * * *'   # A cada 15 minutos
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: '1'

jobs:
  etl-escalation:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL Escalation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/etl_incident_escalation.py
