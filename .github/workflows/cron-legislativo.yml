# .github/workflows/cron-legislativo.yml
# Budget: ~0.5 min/dia (5 exec/semana x ~20s)
name: ETL Legislativo (ALEP)

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Dias uteis as 14h UTC (11h BRT) - ALEP funciona melhor em horario comercial
  workflow_dispatch:

jobs:
  etl-legislativo:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL Legislativo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/etl_legislativo.py
