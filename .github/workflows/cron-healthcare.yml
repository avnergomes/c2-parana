# .github/workflows/cron-healthcare.yml
# Budget: ~30s/dia (1 exec/dia, leve)
name: ETL Healthcare (Leitos SUS)

on:
  schedule:
    - cron: '0 9 * * *'  # Diario as 9:00 UTC (6:00 BRT)
  workflow_dispatch: {}

jobs:
  etl-healthcare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Executar ETL Healthcare
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/etl_healthcare.py
